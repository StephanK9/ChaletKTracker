<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khoury Design · Chalet K</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ═══ TOKENS ═══════════════════════════════════════════════════════════ */
:root {
  --bg:      #09090f;
  --s1:      #0e0f18;
  --s2:      #131422;
  --s3:      #191a2a;
  --s4:      #1f2030;

  --rule:    rgba(255,255,255,0.055);
  --rule2:   rgba(255,255,255,0.10);
  --rule3:   rgba(255,255,255,0.18);

  --cream:   #ede8dc;
  --sand:    #9a9282;
  --dust:    #60594f;
  --mute:    #38342e;

  --gold:        #c4a25a;
  --gold-soft:   rgba(196,162,90,0.08);
  --gold-line:   rgba(196,162,90,0.22);
  --gold-hi:     #d4b870;

  --g:    #2a6845; --g-s: rgba(42,104,69,.09);  --g-l: rgba(42,104,69,.28);
  --ov:   #476820; --ov-s:rgba(71,104,32,.09);  --ov-l:rgba(71,104,32,.28);
  --am:   #7a5818; --am-s:rgba(122,88,24,.09);  --am-l:rgba(122,88,24,.28);
  --rd:   #682828; --rd-s:rgba(104,40,40,.08);  --rd-l:rgba(104,40,40,.24);
  --bl:   #284878; --bl-s:rgba(40,72,120,.09);  --bl-l:rgba(40,72,120,.28);
  --tl:   #1a5060; --tl-s:rgba(26,80,96,.09);   --tl-l:rgba(26,80,96,.28);
  --ed:   #4a3078; --ed-s:rgba(74,48,120,.09);  --ed-l:rgba(74,48,120,.28);

  --serif: 'Cormorant Garamond', 'Palatino Linotype', Georgia, serif;
  --sans:  'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --gut:   2.4rem;
}

/* ═══ RESET ═══════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--cream);
  font-family: var(--sans);
  font-weight: 300;
  font-size: 15px;
  line-height: 1.55;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ═══ LOADER ═══════════════════════════════════════════════════════════ */
#loader {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 1.4rem;
  background: var(--bg); z-index: 999;
  transition: opacity .4s, visibility .4s;
}
#loader.hidden { opacity: 0; visibility: hidden; }
#loader .mark { animation: breathe 2.4s ease-in-out infinite; }
#loader .loading-text {
  font-family: var(--sans); font-size: 9px; font-weight: 400;
  letter-spacing: .28em; text-transform: uppercase; color: var(--dust);
}
@keyframes breathe { 0%,100%{opacity:.3} 50%{opacity:.9} }

/* ═══ APP ═══════════════════════════════════════════════════════════════ */
#app { opacity: 0; transition: opacity .5s .1s; }
#app.ready { opacity: 1; }

/* ═══ HEADER ════════════════════════════════════════════════════════════ */
.hdr {
  background: var(--s1);
  border-bottom: 1px solid var(--rule);
  position: sticky; top: 0; z-index: 80;
  transition: border-color .2s;
}
body.edit-mode .hdr { border-bottom-color: var(--ed-l); }
body.client-mode .hdr { border-bottom-color: rgba(196,162,90,.15); }

.hdr-top {
  display: flex; align-items: center; justify-content: space-between;
  padding: .9rem var(--gut) .7rem;
  border-bottom: 1px solid var(--rule);
  flex-wrap: wrap; gap: .6rem;
}
.hdr-brand {
  display: flex; align-items: center; gap: .7rem;
  font-family: var(--sans); font-size: 9px; font-weight: 500;
  letter-spacing: .22em; text-transform: uppercase; color: var(--sand);
}
.hdr-brand .divider { color: var(--mute); }
.hdr-brand .project { color: var(--cream); }
.hdr-badges { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; }
.mode-badge {
  font-family: var(--sans); font-size: 9px; font-weight: 500;
  letter-spacing: .16em; text-transform: uppercase;
  padding: 3px 10px; border-radius: 2px;
}
.mode-badge.edit { background: var(--ed-s); border: 1px solid var(--ed-l); color: #b8a0e0; }
.mode-badge.client { background: var(--gold-soft); border: 1px solid var(--gold-line); color: var(--gold); }
.sync-dot {
  font-family: var(--sans); font-size: 9px; font-weight: 400;
  letter-spacing: .12em; color: var(--dust);
  display: flex; align-items: center; gap: 5px;
}
.sync-dot::before {
  content: ''; display: block; width: 5px; height: 5px; border-radius: 50%;
  background: var(--dust);
}
.sync-dot.saved::before { background: var(--g); }
.sync-dot.saving::before { background: var(--gold); animation: breathe .8s ease-in-out infinite; }
.sync-dot.error::before { background: var(--rd); }
.sync-dot.local::before { background: var(--dust); }

.hdr-identity {
  padding: 1.4rem var(--gut) 1rem;
  display: flex; align-items: flex-end; justify-content: space-between; gap: 1rem;
  flex-wrap: wrap;
}
.hdr-title-block {}
.hdr-eyebrow {
  font-family: var(--sans); font-size: 9px; font-weight: 400;
  letter-spacing: .24em; text-transform: uppercase; color: var(--gold);
  margin-bottom: .35rem;
}
.hdr-title {
  font-family: var(--serif); font-size: clamp(26px,3.5vw,40px);
  font-weight: 300; line-height: 1.1; letter-spacing: .01em; color: var(--cream);
}
.hdr-title em { font-style: italic; font-weight: 300; }
.hdr-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

/* ═══ BUTTONS ═══════════════════════════════════════════════════════════ */
.btn {
  font-family: var(--sans); font-size: 10px; font-weight: 400;
  letter-spacing: .1em; text-transform: uppercase;
  padding: 6px 14px; border-radius: 2px;
  border: 1px solid var(--rule2); background: transparent;
  color: var(--sand); cursor: pointer; transition: all .15s; white-space: nowrap;
}
.btn:hover { background: var(--s3); color: var(--cream); border-color: var(--rule3); }
.btn.primary { background: var(--gold); border-color: var(--gold); color: #1a1200; font-weight: 500; }
.btn.primary:hover { background: var(--gold-hi); }
.btn.edit-on { background: var(--ed-s); border-color: var(--ed-l); color: #c0aaee; }
.btn.client-on { background: var(--gold-soft); border-color: var(--gold-line); color: var(--gold); }
.btn.pay-on { background: var(--gold-soft); border-color: var(--gold-line); color: var(--gold); }
.btn.price-on { background: var(--bl-s); border-color: var(--bl-l); color: #88aadd; }
.btn.danger { background: var(--rd-s); border-color: var(--rd-l); color: #cc8888; }
.btn.danger:hover { background: rgba(104,40,40,.2); }
.btn.ghost { border-style: dashed; color: var(--dust); border-color: var(--rule); }
.btn.ghost:hover { border-color: var(--rule2); color: var(--sand); }
.btn.edit-only { display: none; }
body.edit-mode .btn.edit-only { display: inline-block; }

/* ═══ METRICS STRIP ═════════════════════════════════════════════════════ */
.metrics-strip {
  display: flex; align-items: stretch;
  border-top: 1px solid var(--rule);
  overflow-x: auto;
}
.metric-cell {
  flex: 1; min-width: 120px;
  padding: 1rem var(--gut);
  border-right: 1px solid var(--rule);
  display: flex; flex-direction: column; gap: .25rem;
}
.metric-cell:last-child { border-right: none; }
.metric-num {
  font-family: var(--serif); font-size: 32px; font-weight: 300;
  line-height: 1; letter-spacing: -.01em; color: var(--cream);
}
.metric-num.gold { color: var(--gold); }
.metric-num.green { color: #4aaa74; }
.metric-num.small {
  font-size: 14px; font-family: var(--sans); font-weight: 300;
  letter-spacing: .01em; padding-top: 4px; color: #5bbdd0; line-height: 1.4;
}
.metric-label {
  font-family: var(--sans); font-size: 9px; font-weight: 400;
  letter-spacing: .16em; text-transform: uppercase; color: var(--dust);
}
.metric-sub {
  font-family: var(--sans); font-size: 10px; color: var(--dust); line-height: 1.35;
}

/* ═══ MAIN ═══════════════════════════════════════════════════════════════ */
.main { padding: 1.8rem var(--gut) 4rem; max-width: 1440px; margin: 0 auto; }

/* ═══ PANELS ═════════════════════════════════════════════════════════════ */
.panel {
  border-radius: 3px; padding: 1.4rem 1.6rem; margin-bottom: 1.4rem;
  border: 1px solid var(--rule);
}
.panel.pay { border-color: var(--gold-line); background: linear-gradient(135deg, var(--s2), var(--s1)); }
.panel.price { border-color: var(--bl-l); background: var(--s1); }
.panel-label {
  font-family: var(--sans); font-size: 9px; font-weight: 400;
  letter-spacing: .22em; text-transform: uppercase; color: var(--dust); margin-bottom: 1.1rem;
}
.panel-internal-note {
  font-family: var(--sans); font-size: 11px; color: var(--dust);
  font-style: italic; margin-bottom: 1rem; line-height: 1.5;
}

/* Payment grid */
.pay-cells { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1rem; }
.pay-cell {
  flex: 1; min-width: 140px;
  background: var(--s2); border: 1px solid var(--rule); border-radius: 2px;
  padding: .9rem 1rem;
}
.pay-cell-label { font-family: var(--sans); font-size: 9px; letter-spacing: .14em; text-transform: uppercase; color: var(--dust); margin-bottom: .3rem; }
.pay-cell-val { font-family: var(--serif); font-size: 20px; font-weight: 400; color: var(--cream); }
.pay-cell-val.gold { color: var(--gold); }
.pay-cell-val.green { color: #4aaa74; }
.pay-input { font-family: var(--serif); font-size: 18px; background: var(--s3); border: 1px solid var(--ed-l); border-radius: 2px; color: var(--cream); padding: 2px 7px; width: 145px; outline: none; }
.pay-input:focus { border-color: var(--ed); }
.pay-note { font-family: var(--sans); font-size: 11px; color: var(--sand); line-height: 1.6; padding-top: 1rem; border-top: 1px solid var(--rule); }
.pay-note strong { color: var(--cream); font-weight: 400; }

/* Pricing table */
.price-tbl { width: 100%; border-collapse: collapse; font-family: var(--sans); font-size: 12px; border: 1px solid var(--rule); border-radius: 2px; overflow: hidden; }
.price-tbl th { background: var(--s2); color: var(--dust); font-size: 9px; letter-spacing: .12em; text-transform: uppercase; padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--rule); font-weight: 400; }
.price-tbl th:not(:first-child) { text-align: right; }
.price-tbl td { padding: 10px 12px; border-bottom: 1px solid var(--rule); color: var(--sand); vertical-align: middle; }
.price-tbl tr:last-child td { border-bottom: none; }
.price-tbl td:not(:first-child) { text-align: right; }
.price-tbl td.cat { color: var(--cream); }
.rate-wrap { display: flex; align-items: center; justify-content: flex-end; gap: 4px; }
.rate-in { font-family: var(--sans); font-size: 12px; background: var(--s2); border: 1px solid var(--rule2); border-radius: 2px; color: var(--cream); padding: 4px 7px; width: 68px; text-align: right; outline: none; }
.rate-in:focus { border-color: var(--gold); }
.cnt-in { font-family: var(--sans); font-size: 12px; background: var(--s2); border: 1px solid var(--rule2); border-radius: 2px; color: var(--cream); padding: 4px 7px; width: 52px; text-align: right; outline: none; }
.cnt-in:focus { border-color: var(--gold); }
.price-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--rule); flex-wrap: wrap; gap: 1rem; }
.price-footer-note { font-family: var(--sans); font-size: 11px; color: var(--sand); max-width: 520px; line-height: 1.6; }
.price-footer-note strong { color: var(--cream); font-weight: 400; }
.price-total { font-family: var(--serif); font-size: 30px; font-weight: 300; color: var(--gold); white-space: nowrap; }

/* ═══ FILTER BAR ══════════════════════════════════════════════════════ */
.filter-bar { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 1.4rem; align-items: center; }
.filter-lbl { font-family: var(--sans); font-size: 11px; font-weight: 400; letter-spacing: .18em; text-transform: uppercase; color: var(--dust); margin-right: 5px; }
.fbtn { font-family: var(--sans); font-size: 12px; font-weight: 300; padding: 5px 14px; border-radius: 20px; border: 1px solid var(--rule); background: transparent; color: var(--sand); cursor: pointer; transition: all .15s; letter-spacing: .04em; }
.fbtn:hover { border-color: var(--rule2); color: var(--cream); }
.fbtn.on { background: var(--cream); color: var(--bg); border-color: var(--cream); font-weight: 400; }
.fbtn.fd.on { background: var(--g); border-color: var(--g); color: #d0ffe8; }
.fbtn.fo.on { background: var(--ov); border-color: var(--ov); color: #d8f0a8; }
.fbtn.fp.on { background: var(--am); border-color: var(--am); color: #f0d8a0; }
.fbtn.fm.on { background: var(--rd); border-color: var(--rd); color: #f0c0c0; }
.fbtn.fe.on { background: var(--bl); border-color: var(--bl); color: #c0d4f8; }

/* ═══ LEGEND ══════════════════════════════════════════════════════════ */
.legend { display: flex; gap: 1.4rem; flex-wrap: wrap; margin-bottom: 1.4rem; align-items: center; }
.leg { display: flex; align-items: center; gap: 6px; font-family: var(--sans); font-size: 12px; color: var(--dust); letter-spacing: .04em; }
.leg-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* ═══ FLOOR SECTIONS ══════════════════════════════════════════════════ */
.floor { margin-bottom: 2.2rem; }
.floor-hdr { display: flex; align-items: center; gap: 1rem; margin-bottom: .9rem; }
.floor-name {
  font-family: var(--serif); font-size: 22px; font-weight: 400;
  letter-spacing: .04em; color: var(--cream);
  letter-spacing: .2em; text-transform: uppercase; color: var(--dust); white-space: nowrap;
}
.floor-rule { flex: 1; height: 1px; background: var(--rule); }
.floor-tally { font-family: var(--sans); font-size: 12px; color: var(--dust); white-space: nowrap; letter-spacing: .06em; }
.floor-acts { display: flex; gap: 5px; }

/* ═══ CARDS ════════════════════════════════════════════════════════════ */
.cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(218px, 1fr)); gap: 1px; background: var(--rule); border: 1px solid var(--rule); border-radius: 3px; overflow: hidden; grid-auto-rows: 1fr; }
.card {
  background: var(--s1); padding: 1.1rem 1.2rem;
  display: grid;
  grid-template-rows: auto auto auto auto 1px auto;
  gap: .7rem;
  transition: background .15s; position: relative;
  border-left: 3px solid transparent;
}
.card:hover { background: var(--s2); }
body.edit-mode .card { cursor: grab; }
body.edit-mode .card:active { cursor: grabbing; }
.card.dragging { opacity: 0.18; pointer-events: none; }
.cards.drag-over {
  outline: 1px dashed var(--gold-line);
  background: linear-gradient(var(--gold-soft), var(--gold-soft));
}
.cards.drag-over .card { opacity: 0.6; }
.card.st-done { border-left-color: var(--g); }
.card.st-over { border-left-color: var(--ov); }
.card.st-partial { border-left-color: var(--am); }
.card.st-missing { border-left-color: var(--rd); }
.card.st-extra { border-left-color: var(--bl); }

.card-hdr { display: flex; justify-content: space-between; align-items: flex-start; gap: .5rem; }
.card-name { font-family: var(--serif); font-size: 18px; font-weight: 400; color: var(--cream); line-height: 1.3; flex: 1; }
.card-edit-btn {
  font-family: var(--sans); font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
  padding: 2px 8px; border-radius: 1px; border: 1px solid var(--ed-l);
  background: var(--ed-s); color: #b0a0d8; cursor: pointer; transition: all .15s;
  white-space: nowrap; flex-shrink: 0; display: none;
}
.card-edit-btn:hover { background: var(--ed); color: #e0d8ff; }
body.edit-mode .card-edit-btn { display: block; }

.status-pill {
  display: flex; align-items: center; gap: 5px;
  font-family: var(--sans); font-size: 9px; font-weight: 400; letter-spacing: .1em; text-transform: uppercase;
}
.status-pill .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.sp-done .dot { background: var(--g); } .sp-done { color: #80ccaa; }
.sp-over .dot { background: var(--ov); } .sp-over { color: #a8cc70; }
.sp-partial .dot { background: var(--am); } .sp-partial { color: #ccaa60; }
.sp-missing .dot { background: var(--rd); } .sp-missing { color: #cc8888; }
.sp-extra .dot { background: var(--bl); } .sp-extra { color: #88aadd; }

.card-num {
  font-family: var(--serif); font-size: 38px; font-weight: 300;
  line-height: 1; color: var(--cream); letter-spacing: -.01em;
}
.card-num.zero { color: var(--dust); }
.card-unit { font-family: var(--sans); font-size: 13px; color: var(--dust); margin-left: 3px; font-weight: 300; }
.card-vs { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: .15rem; }
.vs-text { font-family: var(--sans); font-size: 12px; color: var(--dust); }
.vs-tag { font-family: var(--sans); font-size: 11px; padding: 2px 8px; border-radius: 10px; letter-spacing: .04em; }
.vs-over  { background: var(--ov-s); border: 1px solid var(--ov-l); color: #b0d070; }
.vs-under { background: var(--rd-s); border: 1px solid var(--rd-l); color: #cc8888; }
.vs-exact { background: var(--g-s);  border: 1px solid var(--g-l);  color: #80ccaa; }
.vs-recon { font-family: var(--sans); font-size: 11px; color: var(--dust); letter-spacing: .06em; font-style: italic; }

.card-bar { height: 1px; background: var(--rule); overflow: hidden; }
.card-bar-fill { height: 100%; }
.bar-done { background: var(--g); } .bar-over { background: var(--ov); }
.bar-partial { background: var(--am); } .bar-missing { background: transparent; }
.bar-extra { background: var(--bl); }

.card-src { font-family: var(--sans); font-size: 12px; color: var(--dust); line-height: 1.4; align-self: end; }
.card-note-wrap { border-top: 1px solid var(--rule); padding-top: .5rem; margin-top: .3rem; }
body.client-mode .card-note-wrap { display: none; }
.card-note {
  font-family: var(--sans); font-size: 10px; background: transparent; border: none;
  border-bottom: 1px dashed var(--rule2); color: var(--sand); width: 100%; padding: 3px 0;
  outline: none; transition: border-color .15s;
}
.card-note:focus { border-color: var(--gold); }
.card-note::placeholder { color: var(--mute); }

/* ═══ INFRA CARDS ═════════════════════════════════════════════════════ */
.infra-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1px; background: var(--tl-l); border: 1px solid var(--tl-l); border-radius: 3px; overflow: hidden; }
.infra-card {
  background: var(--s1); padding: 1.1rem 1.2rem;
  display: flex; flex-direction: column; gap: .6rem;
  transition: background .15s;
}
.infra-card:hover { background: var(--s2); }
.infra-card-hdr { display: flex; justify-content: space-between; align-items: flex-start; gap: .6rem; }
.infra-card-name { font-family: var(--serif); font-size: 14px; font-weight: 400; color: var(--cream); line-height: 1.3; }
.infra-badge { font-family: var(--sans); font-size: 9px; letter-spacing: .1em; text-transform: uppercase; padding: 2px 8px; border-radius: 1px; background: var(--tl-s); border: 1px solid var(--tl-l); color: #70bbc8; white-space: nowrap; flex-shrink: 0; }
.infra-edit-btn { font-family: var(--sans); font-size: 9px; letter-spacing: .1em; text-transform: uppercase; padding: 2px 8px; border-radius: 1px; border: 1px solid var(--ed-l); background: var(--ed-s); color: #b0a0d8; cursor: pointer; transition: all .15s; display: none; }
.infra-edit-btn:hover { background: var(--ed); color: #e0d8ff; }
body.edit-mode .infra-edit-btn { display: block; }
.infra-desc { font-family: var(--sans); font-size: 11px; color: var(--dust); line-height: 1.5; }
.infra-status { font-family: var(--sans); font-size: 9px; color: var(--tl); letter-spacing: .08em; border-top: 1px solid var(--rule); padding-top: .5rem; display: flex; align-items: center; gap: 5px; }
.infra-status::before { content: ''; display: block; width: 5px; height: 5px; border-radius: 50%; background: var(--tl); flex-shrink: 0; }

/* ═══ SUMMARY & NEXT STEP ═════════════════════════════════════════════ */
.summary { border: 1px solid var(--rule); border-radius: 3px; padding: 1.4rem 1.6rem; margin-top: 1.8rem; }
.summary-label { font-family: var(--sans); font-size: 9px; letter-spacing: .22em; text-transform: uppercase; color: var(--dust); margin-bottom: .9rem; }
.summary-text { font-family: var(--sans); font-size: 12px; color: var(--sand); line-height: 1.8; }
.summary-text strong { color: var(--cream); font-weight: 400; }
.summary-text .highlight { color: var(--gold); }

textarea.form-in { resize: vertical; min-height: 72px; font-size: 12px; line-height: 1.5; }
select.form-in { cursor: pointer; }
.form-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.form-hint { font-family: var(--sans); font-size: 9px; color: var(--dust); letter-spacing: .04em; }

/* ═══ INTERNAL ONLY ════════════════════════════════════════════════════ */

      const r = await fetch(`${CFG.supabaseUrl}/rest/v1/tracker_data?project_key=eq.${CFG.projectKey}&select=data&limit=1`, { headers: this.hdrs() });

      return rows[0]?.data || null;
    } catch { return null; }
  },

  async save(data) {
    if (!this.ok()) return false;
    try {
      const r = await fetch(`${CFG.supabaseUrl}/rest/v1/tracker_data`, {
        method: 'POST',
        headers: { ...this.hdrs(), Prefer: 'resolution=merge-duplicates' },
        body: JSON.stringify({ project_key: CFG.projectKey, data, updated_at: new Date().toISOString() }),
      });
      return r.ok;
    } catch { return false; }
  },
};

/* ═══════════════════════════════════════════════════════════════════
   METRICS
════════════════════════════════════════════════════════════════════ */
function calcM() {
  let contracted=0, delivered=0, overCount=0, extraCount=0, missingCount=0;
  D.floors.forEach(fl => fl.spaces.forEach(sp => {
    if (sp.status !== 'extra') {
      contracted += sp.contracted; delivered += sp.delivered;
      if (sp.status==='over') overCount += (sp.delivered - sp.contracted);
      if (sp.status==='missing') missingCount++;
    } else {
      extraCount += sp.extra;
    }
  }));
  const pTotal = D.pricing.reduce((a,p) => a + (p.count * p.rate), 0);
  const paidAfter = D.payment.paidBefore + D.payment.invoice005;
  const pct = D.payment.contract > 0 ? Math.round(paidAfter / D.payment.contract * 100) : 0;
  return { contracted, delivered, overCount, extraCount, missingCount, pTotal, paidAfter, pct };
}

function setSyncStatus(s) {
  syncStatus = s;
  const el = document.getElementById('sync-dot');
  if (!el) return;
  el.className = `sync-dot ${s}`;
  const labels = { local:'Local only', saved:'Synced', saving:'Saving…', error:'Sync error', loading:'Loading…' };
  el.textContent = labels[s] || s;
}

════════════════════════════════════════════════════════════════════ */
function scheduleSave() {
  localStorage.setItem('ck_tracker_v3', JSON.stringify(D));
  clearTimeout(saveTimer);
  setSyncStatus('saving');
  saveTimer = setTimeout(async () => {
    if (DB.ok()) {
      const ok = await DB.save(D);
      setSyncStatus(ok ? 'saved' : 'error');
    } else {
      setSyncStatus('local');
    }
  }, 800);
}

  if (pricingOpen) html += renderPricing(m);

    {k:'missing',l:'To complete',c:'fm'},

  html += `<div class="filter-bar"><span class="filter-lbl">Filter</span>`;
  fltrs.forEach(f => { html += `<button class="fbtn ${f.c} ${curFilter===f.k?'on':''}" onclick="setF('${f.k}')">${f.l}</button>`; });

  /* Legend */
  html += `<div class="legend">

    <div class="leg"><div class="leg-dot" style="background:var(--ov)"></div>Overdelivered</div>
    <div class="leg"><div class="leg-dot" style="background:var(--am)"></div>Partial</div>

  /* Add floor */
  html += `<div class="add-section"><button class="btn ghost edit-only" onclick="openAddFloor()">+ Add floor / section</button></div>`;

  /* Infrastructure */
  const showInfra = curFilter === 'all' || curFilter === 'extra';
  html += `<div class="section-gap" ${showInfra?'':'style="display:none"'}>
    <div class="floor-hdr">
      <div class="floor-name">Production Infrastructure &amp; Hidden Work</div>
      <div class="floor-rule"></div>
      <div class="floor-tally">Value delivered beyond render count</div>
      <div class="floor-acts edit-show">
        <button class="btn ghost" style="font-size:9px;padding:3px 10px" onclick="openAddInfra()">+ Add item</button>
      </div>
    </div>
    <div class="infra-cards">`;
  D.infra.forEach(item => { html += renderInfraCard(item); });
  html += `</div></div>`;

  /* Summary */
  html += `<div class="summary internal">
    <div class="summary-label">Reconciliation summary · ${esc(D.project.date)}</div>
    <div class="summary-text">
      <strong>${m.delivered} contract renders tracked</strong> across all updates and additional exterior files. The pool/spa package delivered 12 against a contracted 5 — the single largest overdelivery on the project. Exterior is substantially complete: rear facade, garden, terrace, morning light, and night elevation all tracked across multiple cameras. <span class="highlight">${m.extraCount} additional outputs sit outside the original render-count structure</span> — PAC placement studies and facade material iterations. <strong>Remaining to complete: approximately ${Math.max(0,m.contracted-m.delivered)} renders</strong> — primarily the bedroom package across Combles, Rez Supérieur master, and Rez Inférieur, plus entrance hall and ski room.<br><br>
      In addition to the visible render outputs, a substantial part of the value delivered sits in the production infrastructure: the 3ds Max scene build, custom material library, lighting systems, cameras, revision history, and accumulated project knowledge that now allow new areas to be rendered much faster and more consistently.
    </div>
  </div>`;

  /* Next step */
  html += `<div class="next-box internal">
    <div class="next-label">Next step</div>
    <div class="next-text">
      <strong>Invoice 005 sent for Étape 2B.</strong> After payment clears, reconcile remaining scope: final bedroom package (Combles ×3, master suite, Rez Inférieur ×3), entrance hall, ski room, and utility areas. Agree final exterior cleanup. Open the construction-phase retainer conversation before the final £${D.payment.finalBalance.toLocaleString()} payment.
    </div>

  document.getElementById('app-main').innerHTML = html;

/* ═══════════════════════════════════════════════════════════════════
   RENDER: FLOOR
════════════════════════════════════════════════════════════════════ */
function renderFloor(fl) {
  const show = curFilter==='all' ? fl.spaces : fl.spaces.filter(s=>s.status===curFilter);
  const cr = fl.spaces.filter(s=>s.status!=='extra').reduce((a,s)=>a+s.contracted,0);
  const dr = fl.spaces.filter(s=>s.status!=='extra').reduce((a,s)=>a+s.delivered,0);
  const er = fl.spaces.filter(s=>s.status==='extra').reduce((a,s)=>a+s.extra,0);
  let tally = `${dr} / ${cr} tracked`;
  if (er>0) tally += ` · ${er} additional`;
  const hide = show.length===0 ? 'style="display:none"' : '';
  const dropZ = editMode
    ? 'ondragover="dragOver(\'' + fl.id + '\',event)" ondrop="cardDrop(\'' + fl.id + '\',event)" ondragleave="dragLeave(event)"'
    : '';
  return `<div class="section-gap" ${hide}>
    <div class="floor-hdr">
      <div class="floor-name">${esc(fl.name)}</div>
      <div class="floor-rule"></div>
      <div class="floor-tally">${tally}</div>
      <div class="floor-acts edit-show">
        <button class="btn ghost" style="font-size:9px;padding:3px 10px" onclick="openAddSpace('${fl.id}')">+ Add space</button>
        <button class="btn ghost" style="font-size:9px;padding:3px 10px" onclick="openEditFloor('${fl.id}')">Edit</button>
      </div>
    </div>
    <div class="cards" ${dropZ}>${show.map(sp=>renderCard(fl.id,sp)).join('')}</div>
  </div>`;
}

/* ═══════════════════════════════════════════════════════════════════
   RENDER: CARD
════════════════════════════════════════════════════════════════════ */
function renderCard(floorId, sp) {
  const cfg = STATUS_CFG[sp.status] || STATUS_CFG.missing;
  const isEx = sp.status==='extra';
  const num = isEx ? sp.extra : sp.delivered;
  const pct = Math.min(cfg.pct(sp.delivered, sp.contracted), 100);
  const nk = `ck3_${floorId}_${sp.id}`;
  const nv = esc(sp.note||'');

  let vsHtml = '';
  if (!isEx && sp.contracted>0) {
    const diff = sp.delivered - sp.contracted;
    if (sp.delivered===0) vsHtml=`<span class="vs-tag vs-under">${sp.contracted} to deliver</span>`;
    else if (diff>0) vsHtml=`<span class="vs-text">of ${sp.contracted}</span><span class="vs-tag vs-over">+${diff} over</span>`;
    else if (diff<0) vsHtml=`<span class="vs-text">of ${sp.contracted}</span><span class="vs-tag vs-under">${diff} remaining</span>`;
    else vsHtml=`<span class="vs-text">of ${sp.contracted}</span><span class="vs-tag vs-exact">exact</span>`;
    vsHtml=`<div class="card-vs">${vsHtml}</div>`;
  } else if (isEx) {
    vsHtml=`<div class="card-vs"><span class="vs-recon">additional scope · to reconcile</span></div>`;
  }

  const dragA = editMode
    ? 'draggable="true" ondragstart="dragStart(\'' + floorId + '\',\'' + sp.id + '\',event)"'
    : '';
  return `<div class="card ${cfg.card}" ${dragA}>
    <div class="card-hdr">
      <div class="card-name">${esc(sp.name)}</div>
      <button class="card-edit-btn" onclick="openEditSpace('${floorId}','${sp.id}')">Edit</button>
    </div>
    <div class="status-pill ${cfg.cls}"><div class="dot"></div>${cfg.label}</div>
    <div>
      <span class="card-num ${num===0?'zero':''}">${num}</span><span class="card-unit">render${num!==1?'s':''}</span>
      ${vsHtml}
    </div>
    <div class="card-bar"><div class="card-bar-fill ${cfg.bar}" style="width:${pct}%"></div></div>
    <div class="card-src">${esc(sp.source)}</div>
    <div class="card-note-wrap">
      <input class="card-note" type="text" placeholder="Add note…" value="${nv}" oninput="updateNote('${floorId}','${sp.id}',this.value)">
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════════════════════════════

}

/* ═══════════════════════════════════════════════════════════════════
   LIVE UPDATES (no full re-render for inline edits)
════════════════════════════════════════════════════════════════════ */
function updateNote(fid, sid, val) {
  const fl = D.floors.find(f=>f.id===fid); if(!fl) return;
  const sp = fl.spaces.find(s=>s.id===sid); if(sp) { sp.note=val; scheduleSave(); }
}
function updateInfraNote(iid, val) {
  const it = D.infra.find(i=>i.id===iid); if(it) { it.note=val; scheduleSave(); }
}
function updatePay(field, val) {
  D.payment[field] = parseFloat(val)||0;
  scheduleSave();
  renderHdr();
}
function updateP(idx, field, val) {
  D.pricing[idx][field] = field==='rate' ? (parseFloat(val)||0) : (parseInt(val)||0);
  scheduleSave();
  const m = calcM();
  const el = document.getElementById('p-total');
  if (el) el.textContent = '£'+m.pTotal.toLocaleString();
  renderHdr();
  const rows = document.querySelectorAll('.price-tbl tbody tr');
  rows.forEach((row,i) => { row.cells[3].textContent = '£'+(D.pricing[i].count*D.pricing[i].rate).toLocaleString(); });
}

function saveModal() {
  const ce = curEdit; if(!ce) { closeModal(); return; }
  const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,5);

  if (ce.type==='space'||ce.type==='space-new') {
    const sp = {
      id: ce.type==='space-new' ? uid() : ce.sid,
      name: document.getElementById('f-name').value.trim()||'Unnamed',
      contracted: Math.max(0,parseInt(document.getElementById('f-c').value)||0),
      delivered:  Math.max(0,parseInt(document.getElementById('f-d').value)||0),

      status:     document.getElementById('f-status').value,
      source:     document.getElementById('f-src').value.trim(),
      note:       document.getElementById('f-note').value.trim(),
    };
    const fl = D.floors.find(f=>f.id===ce.fid);

    const name = document.getElementById('f-fname').value.trim()||'New section';

    else { const fl=D.floors.find(f=>f.id===ce.fid); if(fl) fl.name=name; }
  } else if (ce.type==='infra'||ce.type==='infra-new') {
    const it = {
      id: ce.type==='infra-new' ? uid() : ce.iid,
      name:   document.getElementById('f-iname').value.trim()||'Unnamed',
      desc:   document.getElementById('f-idesc').value.trim(),
      status: document.getElementById('f-istatus').value.trim(),
      note:   document.getElementById('f-inote').value.trim(),
    };
    if (ce.type==='infra-new') D.infra.push(it);
    else { const i=D.infra.findIndex(x=>x.id===ce.iid); if(i>=0) D.infra[i]=it; }
  }

  scheduleSave(); closeModal(); render();
}

function delModal() {
  const ce = curEdit; if(!ce) return;
  if (!confirm('Delete this item? Cannot be undone.')) return;
  if (ce.type==='space') { const fl=D.floors.find(f=>f.id===ce.fid); if(fl) fl.spaces=fl.spaces.filter(s=>s.id!==ce.sid); }
  else if (ce.type==='floor') { if(D.floors.length<=1){alert('Cannot delete the last section.');return;} D.floors=D.floors.filter(f=>f.id!==ce.fid); }
  else if (ce.type==='infra') { D.infra=D.infra.filter(i=>i.id!==ce.iid); }
  scheduleSave(); closeModal(); render();
}

/* ═══════════════════════════════════════════════════════════════════
   DRAG & DROP — move cards between sections
════════════════════════════════════════════════════════════════════ */
function dragStart(floorId, spaceId, e) {
  if (!editMode) { e.preventDefault(); return; }
  dragState = { floorId, spaceId };
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', `${floorId}::${spaceId}`);
  // Delay so the original card still renders under the ghost
  requestAnimationFrame(() => {
    const el = document.querySelector(`.card[ondragstart*="${spaceId}"]`);
    if (el) el.classList.add('dragging');
  });
}

function dragOver(targetFloorId, e) {
  if (!dragState || dragState.floorId === targetFloorId) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}

function dragLeave(e) {
  if (!e.currentTarget.contains(e.relatedTarget)) {
    e.currentTarget.classList.remove('drag-over');
  }
}

function cardDrop(targetFloorId, e) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!dragState) return;
  const { floorId: srcId, spaceId } = dragState;
  dragState = null;
  if (srcId === targetFloorId) return;
  const src = D.floors.find(f => f.id === srcId);
  const tgt = D.floors.find(f => f.id === targetFloorId);
  if (!src || !tgt) return;
  const idx = src.spaces.findIndex(s => s.id === spaceId);
  if (idx < 0) return;
  const [space] = src.spaces.splice(idx, 1);
  tgt.spaces.push(space);
  scheduleSave();
  render();
}

// Clean up if dropped outside any zone
document.addEventListener('dragend', () => {
  dragState = null;
  document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
});

function exportJSON() {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(D,null,2)],{type:'application/json'}));
  a.download = `Chalet_K_Tracker_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}
function handleImport(e) {
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const p = JSON.parse(ev.target.result);
      if (!p.floors||!p.payment) throw new Error('Invalid format');
      D = p; scheduleSave(); render(); alert('Imported successfully.');
    } catch(err) { alert('Import failed: '+err.message); }
    e.target.value='';
  };
  r.readAsText(f);
}
function exportCSV() {
  const rows=[['Floor','Space','Status','Contracted','Delivered','Extra','Overdelivery','Source','Note']];
  D.floors.forEach(fl => fl.spaces.forEach(sp => {
    const ov=sp.status==='over'?Math.max(0,sp.delivered-sp.contracted):0;
    rows.push([fl.name,sp.name,sp.status,sp.contracted,sp.status==='extra'?0:sp.delivered,sp.status==='extra'?sp.extra:0,ov,sp.source,sp.note||'']);
  }));
  D.infra.forEach(it => rows.push(['Infrastructure',it.name,'infrastructure','','','','',it.status,it.note||'']));
  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='Chalet_K_Scope_Reconciliation.csv';
  a.click();
}

/* ═══════════════════════════════════════════════════════════════════
   UTILS
════════════════════════════════════════════════════════════════════ */
function esc(s) {
  if (s==null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* ═══════════════════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════════════════════ */
async function init() {
  /* Detect mode from URL */
  const p = new URLSearchParams(window.location.search);
  editMode = p.get('edit') === CFG.editPass;

  /* Show loader mark */
  document.getElementById('loader-mark').innerHTML = mark(42);

  /* Load data */
  setSyncStatus('loading');
  let loaded = false;

  if (DB.ok()) {
    try {
      const cloud = await DB.load();
      if (cloud) { D = cloud; setSyncStatus('saved'); loaded = true; }
    } catch {}
  }

  if (!loaded) {
    const local = localStorage.getItem('ck_tracker_v3');
    D = local ? JSON.parse(local) : JSON.parse(JSON.stringify(DEFAULT_DATA));
    if (DB.ok()) {
      setSyncStatus('saving');
      DB.save(D).then(ok => setSyncStatus(ok ? 'saved' : 'error'));
    } else {
      setSyncStatus('local');
    }
  }

  /* Render */
  render();

  /* Show app */
  const loader = document.getElementById('loader');
  const app = document.getElementById('app');
  setTimeout(() => {
    loader.classList.add('hidden');
    app.classList.add('ready');
  }, 400);
}

init();
</script>
